<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Low Stock Report</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <h1>Low Stock Report</h1>

    <nav>
        <a href="index.html">Home</a> |
        <a href="add.html">Add Stock</a> |
        <a href="reduce.html">Reduce Stock</a>
        <a href="delete.html">Delete Product</a>
    </nav>

    <h2>Products Below Threshold</h2>
    <table id="reportTable" border="1">
        <thead>
            <tr>
                <th>Product ID</th>
                <th>Name</th>
                <th>Quantity</th>
                <th>Threshold</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script>
        async function loadLowStock() {
            const response = await fetch('http://localhost:5000/low-stock');
            const products = await response.json();
            const tableBody = document.querySelector('#reportTable tbody');
            tableBody.innerHTML = '';

            if (products.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="4">All products are sufficiently stocked.</td></tr>';
            } else {
                products.forEach(product => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
            <td>${product.product_id}</td>
            <td>${product.name}</td>
            <td>${product.quantity}</td>
            <td>${product.threshold}</td>
          `;
                    tableBody.appendChild(row);
                });
            }
        }

        loadLowStock();

        function logout() {
            localStorage.removeItem('loggedIn');
            window.location.href = 'login.html';
        }
    </script>
</body>

</html>
